<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Magic E Alchemy Workshop Pro</title>
  <style>
    :root {
      --energy: 0;
      --energy-fill: 0%;
      --arc-alpha: 0;
      --arc-width: 0px;
      --arc-glow: 0px;
      --arc-secondary-alpha: 0;
      --arc-secondary-width: 0px;
      --lava-heat: 0;
      --lava-glow-alpha: 0.18;
      --lava-glow-size: 1rem;
      --lava-core-alpha: 0.16;
      --lava-accent-alpha: 0;
      --a-scale: 1;
      --a-radius: 0.16em;
      --p-jitter-x: 0px;
      --p-jitter-y: 0px;
      --p-rotate: 0deg;
      --crystal-scale: 1;
      --crystal-glow: 0px;
      --crystal-pulse-scale: 1.035;
      --orb-core-alpha: 0.18;
      --orb-shadow-size: 0.6rem;
      --orb-shadow-alpha: 0.22;
      --vowel-filter: saturate(1);
      --vowel-before-opacity: 0.5;
      --listen-pulse: 0;
      --checking-pulse: 0;
      --letter-size: clamp(4.25rem, 12vw, 10.5rem);
      --basalt: #222324;
      --basalt-edge: #0d0f10;
      --basalt-light: #53575a;
      --obsidian: #0b0b0f;
      --gold: 245, 188, 80;
      --gold-bright: 255, 235, 166;
      --violet: 179, 100, 255;
      --cyan: 119, 230, 255;
      --lava: 255, 94, 35;
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; color: #f6ead2;
      background: radial-gradient(circle at 16% 14%, rgba(150, 73, 255, 0.18), transparent 18rem),
                  radial-gradient(circle at 79% 16%, rgba(255, 183, 76, 0.16), transparent 20rem),
                  linear-gradient(135deg, rgba(54, 31, 19, 0.78), rgba(12, 10, 14, 0.92) 46%, rgba(24, 16, 12, 0.96)), #100d0c;
      overflow-x: hidden;
    }

    /* 顶部教学引导区域 */
    .tutorial-header {
      position: fixed;
      top: 2rem;
      left: 50%;
      transform: translateX(-50%);
      width: min(90%, 600px);
      z-index: 100;
      text-align: center;
      pointer-events: none;
    }

    .guide-bubble {
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(var(--gold), 0.5);
      padding: 1rem 1.5rem;
      border-radius: 1rem;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 20px rgba(0,0,0,0.5), inset 0 0 15px rgba(var(--gold), 0.1);
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .guide-bubble h2 {
      margin: 0 0 0.5rem 0;
      font-size: 1.2rem;
      color: rgb(var(--gold-bright));
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .guide-bubble p {
      margin: 0;
      font-size: 1rem;
      line-height: 1.4;
      color: #fff4dc;
    }

    /* Magic E 按钮激活状态 */
    .magic-e:active {
      transform: scale(0.92) !important;
      filter: brightness(1.5) !important;
      box-shadow: 0 0 3rem rgba(var(--violet), 1) !important;
    }

    /* 能量槽高亮爆发效果 */
    .mana-fill {
      position: relative;
      overflow: hidden;
    }
    
    .mana-fill.surge {
      animation: energySurge 0.8s ease-out;
    }

    @keyframes energySurge {
      0% { filter: brightness(1) saturate(1); box-shadow: 0 0 1.6rem rgba(var(--violet), 0.54); }
      50% { filter: brightness(2) saturate(2); box-shadow: 0 0 4rem rgba(var(--gold-bright), 1); }
      100% { filter: brightness(1) saturate(1); box-shadow: 0 0 1.6rem rgba(var(--violet), 0.54); }
    }

    main { min-height: 100vh; display: grid; place-items: center; padding: 2rem; }
    .workshop { width: min(1100px, 94vw); display: grid; gap: 2rem; }
    .table { position: relative; min-height: 40rem; display: grid; place-items: center; border-radius: 10px; background: radial-gradient(ellipse at center, rgba(255, 198, 95, 0.08), transparent 48%), linear-gradient(145deg, rgba(31, 18, 12, 0.88), rgba(9, 8, 10, 0.9) 66%); box-shadow: inset 0 0 0 1px rgba(255, 224, 166, 0.11), 0 1.5rem 5rem rgba(0, 0, 0, 0.38); isolation: isolate; }
    .word-stage { position: relative; width: 100%; display: grid; place-items: center; }
    .word { display: flex; align-items: flex-end; gap: 0.5rem; transition: gap 0.7s; }
    body.is-awake .word { gap: 1.5rem; }
    .letter { width: 0.76em; height: 1.04em; font-size: var(--letter-size); font-family: Georgia, serif; font-weight: 900; display: grid; place-items: center; transition: all 0.4s; }
    .basalt { background: linear-gradient(145deg, var(--basalt-light), var(--basalt) 44%, var(--basalt-edge)); border-radius: 0.16em; }
    .vowel { background: linear-gradient(145deg, #402016, #1a0d0a 64%, #090605); color: #24100a; filter: var(--vowel-filter); }
    body.is-stable .vowel { color: #4f3008; background: linear-gradient(145deg, #fff0aa, #f0b63d 45%, #86550f); box-shadow: 0 0 2rem rgba(var(--gold), 0.85); }
    .magic-e { cursor: pointer; opacity: 0; width: 0; background: rgba(var(--violet), 0.2); border: 1px solid rgba(var(--violet), 0.3); border-radius: 0.16em; }
    body.is-awake .magic-e { opacity: 1; width: 0.76em; animation: crystalPulse 1.8s infinite; }
    .control-panel { padding: 1.5rem; background: rgba(8, 8, 12, 0.5); backdrop-filter: blur(20px); border: 1px solid rgba(var(--gold), 0.3); border-radius: 14px; }
    .mana-row { display: grid; grid-template-columns: auto 1fr auto; gap: 1rem; align-items: center; }
    .mana-meter { height: 3.5rem; background: #000; border-radius: 2rem; border: 1px solid rgba(var(--gold), 0.2); padding: 0.4rem; }
    .mana-fill { height: 100%; width: var(--energy-fill); background: linear-gradient(90deg, rgba(var(--violet), 1), rgba(var(--cyan), 1), rgba(var(--gold-bright), 1)); border-radius: 2rem; transition: width 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); }
    .status { margin-top: 1rem; text-align: center; color: rgba(var(--gold), 0.8); }
    .energy-svg { position: absolute; inset: 0; pointer-events: none; }
    .energy-arc { fill: none; stroke: rgba(var(--violet), 0.8); stroke-width: var(--arc-width); }
    @keyframes crystalPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    /* --- 修改原本的 .word 样式，引入空间纵深与变量 --- */
    .word { 
      position: relative;
      --gap: 0.5rem; 
      gap: var(--gap); 
    }
    body.is-awake .word { 
      --gap: 1.5rem; 
    }
    
    /* --- 新增：电影级“星际穿越”时空螺旋光子通道（已修正范围与方向） --- */
    .photon-channel {
      position: absolute;
      top: 50%;
      
      /* 【修改 1】重新计算起点：只跳过第一个字母 c（宽度 0.76em），通道从 c 的右侧边缘开始 */
      left: 0.76em; 
      
      /* 【修改 2】重新计算总宽度：跨越了 3 个间距（gap）和 2 个字母（a 和 p 的宽度之和：0.76em * 2 = 1.52em） */
      width: calc(var(--gap) * 3 + 1.52em); 
      
      height: 50px; /* 拓宽纵向空间以容纳引力扭转 */
      transform: translateY(-50%);
      pointer-events: none;
      z-index: 0; /* 置于底层，光子会在字母之间的间隙（gap）中显现出来 */
      
      /* 注入 3D 视距，产生跨越维度的空间压缩感 */
      perspective: 400px; 
      opacity: calc(var(--synergy-level) * 0.95);
      transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), left 0.7s, width 0.7s;
      
      /* 使用渐变蒙版，让星云能量在接近两端时呈现细腻的“薄雾纱”消散效果 */
      mask-image: linear-gradient(to right, transparent 0%, #000 15%, #000 85%, transparent 100%);
      -webkit-mask-image: linear-gradient(to right, transparent 0%, #000 15%, #000 85%, transparent 100%);
    }

    /* 双螺旋量子流：利用伪元素构建互锁的引力浪潮 */
    .photon-channel::before,
    .photon-channel::after {
      content: '';
      position: absolute;
      inset: 0;
      background-size: 30px 100%;
    }

    /* 前向金白螺旋流 */
    .photon-channel::before {
      background-image: repeating-linear-gradient(
        135deg,
        transparent,
        transparent 2px,
        rgba(var(--gold-bright), 0.5) 3px,
        rgba(var(--gold), 0.7) 4px,
        transparent 5px,
        transparent 9px
      );
      filter: blur(0.6px) drop-shadow(0 0 4px rgba(var(--gold), 0.6));
      
      /* 【修改 3】为了让主能量流向右（从 C 到 E），我们在 cosmicFlow 后面加上 reverse 反转原有的向左运动 */
      animation: interstellarHelixA 2.5s linear infinite, cosmicFlow 0.9s linear infinite reverse;
    }

/* 后向暗金引力流 */
.photon-channel::after {
  background-image: repeating-linear-gradient(
    45deg,
    transparent,
    transparent 3px,
    rgba(var(--gold), 0.4) 4px,
    rgba(var(--gold-bright), 0.3) 5px,
    transparent 6px,
    transparent 11px
  );
  filter: blur(1px) drop-shadow(0 0 6px rgba(var(--gold), 0.4));
  
  /* 【修改 4】将原本反向的暗流改为正向，与主能量流形成对流，增强扭转的真实感 */
  animation: interstellarHelixB 2.5s linear infinite, cosmicFlow 1.4s linear infinite;
}
    
    /* 后向暗金引力流（相位偏移 180° 且反向运动，形成缠绕的视觉错觉） */
    .photon-channel::after {
      background-image: repeating-linear-gradient(
        45deg,
        transparent,
        transparent 3px,
        rgba(var(--gold), 0.4) 4px,
        rgba(var(--gold-bright), 0.3) 5px,
        transparent 6px,
        transparent 11px
      );
      filter: blur(1px) drop-shadow(0 0 6px rgba(var(--gold), 0.4));
      animation: interstellarHelixB 2.5s linear infinite, cosmicFlow 1.4s linear infinite reverse;
    }
    
    /* --- 电影级特效动画定义 --- */
    
    /* 顺着能量倾泻方向的粒子流动感 */
    @keyframes cosmicFlow {
      from { background-position: 30px 0; }
      to { background-position: 90px 0; }
    }
    
    /* 模拟光线围绕黑洞引力场旋转的 3D 空间扭转（Strand A） */
    @keyframes interstellarHelixA {
      0% { transform: rotateX(0deg) scaleY(0.8); filter: blur(0.6px) brightness(1.2); }
      50% { transform: rotateX(180deg) scaleY(0.2); filter: blur(1.2px) brightness(0.5); } /* 转到背面时变暗、变模糊 */
      100% { transform: rotateX(360deg) scaleY(0.8); filter: blur(0.6px) brightness(1.2); }
    }
    
    /* 与 Strand A 完美互锁的对称运动（Strand B） */
    @keyframes interstellarHelixB {
      0% { transform: rotateX(180deg) scaleY(0.2); filter: blur(1.2px) brightness(0.5); }
      50% { transform: rotateX(360deg) scaleY(0.8); filter: blur(0.6px) brightness(1.2); }
      100% { transform: rotateX(540deg) scaleY(0.2); filter: blur(1.2px) brightness(0.5); }
    }
    
    /* --- 协同点亮：赋予字母 A 和 E 星际电影级的引力耀斑扩散 --- */
    body.is-awake #letterA {
      filter: brightness(calc(1 + var(--synergy-level) * 0.9)) contrast(1.1);
      text-shadow: 0 0 calc(var(--synergy-level) * 12px) rgba(var(--gold-bright), 0.9),
                   0 0 calc(var(--synergy-level) * 30px) rgba(var(--gold), 0.6);
      transition: filter 0.5s cubic-bezier(0.4, 0, 0.2, 1), text-shadow 0.5s;
    }
    
    body.is-awake #letterE {
      filter: brightness(calc(1 + var(--synergy-level) * 0.8)) contrast(1.1);
      box-shadow: inset 0 0 calc(var(--synergy-level) * 10px) rgba(var(--gold-bright), 0.4),
                  0 0 calc(var(--synergy-level) * 25px) rgba(var(--violet), 0.8),
                  0 0 calc(var(--synergy-level) * 45px) rgba(var(--gold), 0.5);
      transition: filter 0.5s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.5s;
    }
  </style>
</head>
<body>

  <header class="tutorial-header">
    <div class="guide-bubble" id="mainGuide">
      <h2 id="guideTitle">炼金学徒，欢迎</h2>
      <p id="guideText">点击单词末尾的紫水晶 <b>e</b>，开启 Magic E 的转化仪式。</p>
    </div>
  </header>

  <main>
    <section class="workshop">
      <div id="table" class="table">
        <div class="word-stage" id="wordStage">
          <svg id="energySvg" class="energy-svg">
            <path id="arcMain" class="energy-arc"></path>
          </svg>

          <div class="word" id="word">
            <div class="photon-channel" id="photonChannel"></div>
            <div class="letter basalt">c</div>
            <div class="letter vowel" id="letterA">a</div>
            <div class="letter basalt" id="letterP">p</div>
            <button class="letter magic-e" id="letterE" type="button">e</button>
          </div>
        </div>
      </div>

      <div class="control-panel">
        <div class="mana-row">
          <div style="width: 50px; height: 50px; border-radius: 50%; background: rgba(var(--violet), 0.3); border: 1px solid rgba(var(--violet), 0.5);"></div>
          <div class="mana-meter">
            <div class="mana-fill" id="manaFill"></div>
          </div>
          <div class="meter-label" id="meterLabel" style="font-weight: bold; width: 50px;">0 / 3</div>
        </div>
        <div class="status" id="status">Magic E 正在沉睡...</div>
        <div style="display: flex; gap: 1rem; margin-top: 1rem; justify-content: center;">
          <button id="listenButton" style="padding: 0.8rem 1.5rem; border-radius: 2rem; border: 1px solid rgba(var(--gold), 0.5); background: transparent; color: #fff; cursor: pointer;">试听 cape</button>
          <button id="resetButton" style="padding: 0.8rem 1.5rem; border-radius: 2rem; border: 1px solid rgba(var(--gold), 0.5); background: transparent; color: #fff; cursor: pointer;" disabled>重置工坊</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    // 状态管理
const state = {
  awake: false,
  stable: false,
  hits: 0,
  checking: false,
  recognition: null
};

const root = document.documentElement;
const body = document.body;
const letterE = document.getElementById('letterE');
const manaFill = document.getElementById('manaFill');
const guideTitle = document.getElementById('guideTitle');
const guideText = document.getElementById('guideText');
const status = document.getElementById('status');
const meterLabel = document.getElementById('meterLabel');

// --- 核心修复：录音控制逻辑 ---

// 启动录音
function startRecording(e) {
  if (!state.awake || state.stable || state.checking) return;
  
  if (e && typeof e.preventDefault === 'function') e.preventDefault();

  // 如果识别实例不存在，则初始化
  if (!state.recognition) {
    state.recognition = initRecognition();
  }

  if (state.recognition) {
    try {
      state.recognition.start();
      state.checking = true;
      status.textContent = "正在聆听 'cape'...";
      root.style.setProperty('--checking-pulse', '1');
    } catch (err) {
      console.warn("识别已在运行中");
    }
  }
}

// 停止录音
function stopRecording() {
  if (!state.checking) return;
  
  if (state.recognition) {
    state.recognition.stop();
  }
}

// 唤醒与触发逻辑：第一次点击唤醒，之后变为单次点击触发/停止录音
letterE.addEventListener('click', (e) => {
  if (!state.awake) {
    state.awake = true;
    updateVisuals();
  } else {
    if (state.stable) return;
    
    // 如果正在录音则再次点击停止，否则启动录音
    if (state.checking) {
      stopRecording();
    } else {
      startRecording(e);
    }
  }
});

// --- 界面与引导更新 ---

function updateGuide() {
  if (!state.awake) {
    guideTitle.textContent = "第一步：唤醒";
    guideText.innerHTML = "点击紫水晶 <b>e</b> 唤醒它。它将展现魔力，改变单词的结构。";
  } else if (!state.stable) {
    guideTitle.textContent = `魔力积蓄中 (${Math.floor(state.hits)}/3)`;
    guideText.innerHTML = "<b>点击紫水晶 e</b> 并大声读出 <b>'cape'</b>。<br><small>提示：让 a 发出长音 /eɪ/，像字母 A 的读音一样！</small>";
  } else {
    guideTitle.textContent = "转化成功！";
    guideText.innerHTML = "你已掌握 Magic E 的秘密。原本的 <b>cap</b> 已经稳定成为了 <b>cape</b>。";
  }
}

function triggerEnergySurge() {
  manaFill.classList.remove('surge');
  void manaFill.offsetWidth; 
  manaFill.classList.add('surge');
}

function updateVisuals() {
  const level = state.hits / 3;
  root.style.setProperty('--energy-fill', `${level * 100}%`);
  const synergyLevel = Math.min(Math.max(state.hits / 3, 0), 1);
  root.style.setProperty('--synergy-level', synergyLevel);
  meterLabel.textContent = `${Math.floor(state.hits)} / 3`;
  
  if (state.awake) {
    body.classList.add('is-awake');
    if (!state.checking) {
        status.textContent = state.stable ? "炼金转化完成！" : "请点击 e 并发音...";
    }
    root.style.setProperty('--arc-width', `${2 + level * 8}px`);
  }
  
  if (state.stable) {
    body.classList.add('is-stable');
    document.getElementById('resetButton').disabled = false;
    status.textContent = "完美转化！";
  }
  updateGuide();
}

// --- 语音识别核心 (你提供的算法版) ---

function initRecognition() {
  const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!Speech) {
    status.textContent = "浏览器不支持语音识别";
    return null;
  }
  const rec = new Speech();
  rec.lang = 'en-US';
  rec.continuous = false;
  rec.interimResults = false;
  
  rec.onresult = (e) => {
    const transcript = e.results[0][0].transcript;
    const confidence = e.results[0][0].confidence;
    const score = evaluatePronunciation(transcript, confidence);

    if (score >= 80) {
      state.hits = Math.min(state.hits + 1, 3);
      triggerEnergySurge(); 
      status.textContent = "完美长元音！✨";
    } else if (score >= 50) {
      state.hits = Math.min(state.hits + 0.5, 3);
      status.textContent = "很接近了，发音再饱满一点！👏";
    } else {
      state.hits = Math.max(0, state.hits - 0.3);
      status.textContent = "听起来像短音 'cap'，记得拉长 a 的声音！";
    }

    if (state.hits >= 3) state.stable = true;
    updateVisuals();
  };
  
  rec.onend = () => { 
    state.checking = false;
    root.style.setProperty('--checking-pulse', '0');
    updateVisuals(); 
  };
  
  rec.onerror = (e) => {
    state.checking = false;
    if (e.error !== 'no-speech') {
        status.textContent = "试着离麦克风近一点...";
    }
  };
  
  return rec;
}

// --- 辅助算法函数 ---

function levenshteinDistance(a, b) {
  const matrix = [];
  for (let i = 0; i <= b.length; i++) matrix[i] = [i];
  for (let j = 0; j <= a.length; j++) matrix[0][j] = j;
  for (let i = 1; i <= b.length; i++) {
    for (let j = 1; j <= a.length; j++) {
      if (b.charAt(i - 1) === a.charAt(j - 1)) {
        matrix[i][j] = matrix[i - 1][j - 1];
      } else {
        matrix[i][j] = Math.min(matrix[i - 1][j - 1] + 1, matrix[i][j - 1] + 1, matrix[i - 1][j] + 1);
      }
    }
  }
  return matrix[b.length][a.length];
}

function evaluatePronunciation(transcript, confidence) {
  const word = transcript.toLowerCase().trim().replace(/[^\w\s]/g, '');
  const perfectMatches = ['cape', 'kape', 'kayp', 'cake'];
  const longAVariants = ['cave', 'tape', 'shape', 'keep', 'k', 'ate'];
  const shortAVariants = ['cap', 'cab', 'cat', 'map'];

  let baseScore = 0;
  if (perfectMatches.includes(word)) baseScore = 100;
  else if (longAVariants.includes(word)) baseScore = 75;
  else if (shortAVariants.includes(word)) baseScore = 30;
  else {
    const target = 'cape';
    const distance = levenshteinDistance(word, target);
    const maxLength = Math.max(word.length, target.length);
    baseScore = ((maxLength - distance) / maxLength) * 100;
  }

  const safeConfidence = confidence > 0 ? confidence : 0.5; 
  return Math.round(baseScore * (0.7 + 0.3 * safeConfidence));
}

// --- 其他功能 ---

document.getElementById('listenButton').addEventListener('click', () => {
  const synth = window.speechSynthesis;
  const utter = new SpeechSynthesisUtterance(state.awake ? "cape" : "cap");
  utter.lang = 'en-US';
  synth.speak(utter);
});

// --- 找到重置按钮并将其功效修改为：页面彻底回到初始状态 ---
document.getElementById('resetButton').addEventListener('click', () => {
  // 1. 停止当前可能正在运行的语音识别或背景朗读
  try {
    if (recognition && state.recognizing) {
      recognition.stop();
    }
    window.speechSynthesis.cancel();
  } catch(e) { console.log(e); }

  // 2. 彻底重置全局状态机到刚打开页面时的状态
  state.hits = 0;
  state.awake = false;
  state.recognizing = false;
  state.unlocked = false;

  // 3. 清空控制台和视觉反馈面板的提示文字
  statusIndicator.innerHTML = '<span style="color: rgba(var(--basalt-bright), 0.5)">✦ 炼金工坊已就绪，等待唤醒 Magic E...</span>';
  feedbackEl.textContent = "— 炼金台静默中 —";
  feedbackEl.className = "feedback-text";
  transcriptEl.textContent = "";

  // 4. 恢复 root 节点上所有的初始 CSS 变量控制（压制所有发光与位移）
  root.style.setProperty('--energy', '0');
  root.style.setProperty('--energy-fill', '0%');
  root.style.setProperty('--synergy-level', '0'); // 重置 a 和 e 之间的光子通道与协同亮度
  root.style.setProperty('--arc-alpha', '0');
  root.style.setProperty('--arc-width', '0px');
  root.style.setProperty('--arc-glow', '0px');
  root.style.setProperty('--arc-secondary-alpha', '0');
  root.style.setProperty('--arc-secondary-width', '0px');
  root.style.setProperty('--lava-heat', '0');
  root.style.setProperty('--lava-glow-alpha', '0.18');
  root.style.setProperty('--lava-glow-size', '1rem');
  root.style.setProperty('--lava-core-alpha', '0.16');
  root.style.setProperty('--lava-accent-alpha', '0');
  root.style.setProperty('--a-scale', '1');
  root.style.setProperty('--a-radius', '0.16em');
  root.style.setProperty('--p-jitter-x', '0px');
  root.style.setProperty('--p-jitter-y', '0px');
  root.style.setProperty('--p-rotate', '0deg');
  root.style.setProperty('--crystal-scale', '1');
  root.style.setProperty('--crystal-glow', '0px');
  root.style.setProperty('--orb-core-alpha', '0.18');
  root.style.setProperty('--orb-shadow-size', '0.6rem');
  root.style.setProperty('--orb-shadow-alpha', '0.22');
  root.style.setProperty('--vowel-filter', 'saturate(1)');
  root.style.setProperty('--vowel-before-opacity', '0');

  // 5. 移除全页面的激活状态类（让单词间距 gap 缩回、关闭觉醒特效）
  body.classList.remove('is-awake');
  
  // 6. 恢复 Magic E 按钮的原本样式与动效类，使其重新进入“沉睡呼吸”状态
  const letterE = document.getElementById('letterE');
  if (letterE) {
    letterE.className = "letter magic-e";
    letterE.style.transform = "";
    letterE.style.filter = "";
    letterE.style.boxShadow = "";
  }

  // 7. 同步更新计量器和按钮状态的 UI 渲染
  updateVisuals();
  
  // 8. 额外平滑重置：触发一次震动或界面刷新感（可选，此处通过台词体现）
  console.log("Alchemy Lab Reset Complete.");
});

updateVisuals();

  </script>
